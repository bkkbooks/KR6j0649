body:
  text: 光祿大夫大司徒三藏法師沙囉巴奉詔譯如是我聞一時婆伽梵在金剛場爾時如來神力如持金剛手身成金剛已即日入金剛三摩地是時金剛手承佛神力及一切如來諸菩薩等加持力故金剛忿怒説此最妙金剛心陀羅尼無斷無壞諦實堅固無有能礙亦無怯退一切衆生皆令怕怖能與衆生摧伏煩惱斷諸明呪鎮諸明呪及摧諸行能破他行摧折諸魔解諸魔執句攝一切諸部多衆復令一切諸修明呪未成就者令得成就既成就者不令唐捐所有希願皆使如意亦能祐護一切衆生息災增益復能禁止迷悶諸惡有情皆是陀羅尼神呪之力金剛手承佛神力即説呪曰那謨囉拏吒夜引耶那謨贊吒嚩日囉二合拔拏曳摩訶夜伽悉拏引拔怛曳怛姪他唵怛囉二合吒怛囉二吒覩邏二合吒耶覩邏二合吒耶室菩吒室菩吒室婆吒耶室婆吒耶孤哩拏孤哩拏二合孤哩拏二合拔耶孤哩拏二合拔耶薩哩嚩二合薩埵尼跋多重呼跋多三跋多重呼耶三跋哆重呼耶鉢囉二合麻鉢囉二合麻三鉢囉二合麻耶三鉢囉二合麻耶薩哩嚩二合菩重呼怛尼孤吒孤吒三孤吒耶三孤吒耶薩哩嚩二合設咄嚕二合喃葛吒葛吒三葛重呼吒耶三葛重呼吒耶薩哩嚩二合毗怛耶二合嚩日囉三合嚩日囉三合室菩二合吒嚩日囉二合嚩日囉三合葛吒嚩日囉三合嚩日囉三合麻吒嚩日囉三合嚩日囉三合麻他嚩日囉三合嚩日囉三合阿吒訶薩尼辣嚩日囉三合蘇嚩日囉三合曳莎嚩訶引醯菩魯尼魯菩魯吉哩二合拏孤嚕弭哩粗嚕孤嚕孤嚕嚩日囉二合毗匝耶莎嚩訶吉哩吉辣引耶莎嚩訶葛吒葛吒麻吒麻吒囉吒囉吒摩吒拏鉢囉二合摩吒拏引曳莎嚩訶拶囉尼拶囉訶囉訶囉薩囉薩囉麻囉耶嚩日囉二合毗怛引囉拏曳莎嚩訶親多重呼親多重呼頻多重呼頻多重呼麻訶吉哩吉辣引耶莎嚩訶班多重呼班多戈邏二合多重呼戈邏多三合吉哩吉辣引耶莎嚩訶粗嚕粗嚕贊吒吉哩吉辣耶莎嚩訶怛囉二合薩耶怛囉二合薩耶嚩日囉三合吉哩吉辣耶莎嚩訶引訶囉訶囉嚩日囉二合多重呼囉耶莎嚩訶引鉢囉二合訶囉鉢囉二合訶囉嚩日囉三合鉢囉二合班匝拏曳莎嚩訶引麻帝室提二合囉嚩日囉三合蘇帝室提二合囉嚩日囉三合鉢囉二合帝室提二合囉嚩日囉三合麻訶引嚩日囉三合阿鉢囉二合帝訶怛嚩日囉三合阿摩葛重呼嚩日囉三合伊醯嚩日囉三合室葛浪二合嚩日囉三合耶莎嚩訶多囉多重呼囉帝哩帝哩覩魯覩魯薩哩嚩二合嚩日囉三合孤闌阿引嚩哩二合怛耶莎嚩訶引阿母岡麻引囉耶發吒半音那麻三滿多囉日囉三合喃薩哩嚩二合嚩辣阿嚩哩怛三合耶麻訶引嚩日囉三合麻阿引嚩烈葛怛閉怛怛烈阿拶烈曼吒辣麻引曳阿帝嚩日囉麻訶引嚩烈毗葛重呼囉拏阿積帝佐辣佐辣帝帝哩二合帝帝哩二合定葛重呼烈多重呼訶多訶底拶拔帝帝哩帝哩班多重呼班多重呼麻訶引嚩烈嚩日囉三合昂葛佐辣引耶莎嚩訶那謨囉拏吒夜耶那謨贊吒嚩日囉三合拔拏曳麻訶夜伽悉拏拔怛曳怛姪他唵訶囉訶囉嚩日囉三合麻他麻他嚩日囉覩重呼拏覩重呼拏嚩日囉三合多訶多訶嚩日囉三合拔拶拔拶嚩日囉多重呼囉多重呼囉嚩日囉三合多重呼囉耶多重呼囉耶嚩日囉二合多重呼嚕拏多重呼嚕拏嚩日囉二合親多重呼親多重呼嚩日囉三合頻多重呼頻多重呼嚩日囉三合吽發吒半音那謨贊吒嚩日囉三合孤嚕二合陀重呼耶呼嚕呼嚕帝瑟陀二合帝瑟陀班陀重呼班陀重呼訶拏訶拏阿彌哩二合帝吽發吒半音罪業咸清淨盡除一切苦諸經之根本莊嚴妙德相有情諸損根命盡及夭橫值遇不豐饒并諸天棄背親友返憎害觸惱婆羅門撓害不和睦財乏并擾惱憂戚苦逼迫逢難貧困苦惡星曜呪詛被諸魔侵害由妊懷憂戚夢見不吉祥沐浴皆清淨應聽最勝經若有淨善心著諸淨潔衣依佛甚深行受持此經者由是威神力是彼諸有情所有病苦等悉令盡消滅福壽皆增益遠離諸罪垢珠芥香蔓草無瑕寶栴檀玉金剛杵花閻淨水金瓶或以銀為瓶繫淨綵盈滿數念二十一或滿百八遍壞相金剛呪國王常沐浴
